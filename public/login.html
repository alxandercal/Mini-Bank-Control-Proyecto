<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Bancario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./assets/css/login.css">
</head>

<body class="login-bank-page">

    <main class="desktop-auth">

        <section class="auth-left">
            <img src="./assets/pictures/logoBank.png" alt="Logo banco">
            <h1>ARGENTARIA</h1>
            <p>Tu banca digital segura, rápida y moderna.</p>
        </section>

        <section class="auth-right">
            <div class="auth-card">

                <h2>Iniciar sesión</h2>
                <p>Accede a tu cuenta bancaria</p>

                <form id="loginForm">

                    <div class="form-group-bank">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" placeholder="tu correo">
                    </div>

                    <div class="form-group-bank">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="contraseña">
                    </div>

                    <button type="submit" class="btn-bank-primary">
                        LOG IN
                    </button>

                    <a href="recuperar.html" class="bank-link center">
                        ¿Olvidaste tu usuario/contraseña?
                    </a>

                </form>

                <div class="auth-bottom-links">
                    <a href="register.html">Crear cuenta</a>
                </div>

            </div>
        </section>

    </main>

    <script type="module" src="./assets/js/login.js"></script>

</body>

</html>
