<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimientos Argentaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./assets/css/dashboard.css?v=30">
</head>

<body class="dashboard-bank-page">
    <input type="checkbox" id="sidebarToggle" class="sidebar-toggle">
    <label for="sidebarToggle" class="sidebar-menu-btn">
        <span></span>
        <span></span>
    </label>
    <aside class="bank-sidebar">
        <div class="sidebar-logo">
            <img src="./assets/pictures/logoBank.png" alt="Logo banco">
            <h2>ARGENTARIA</h2>
            <p>Sistema bancario académico</p>
        </div>
        <nav>
<nav>

    <a href="dashboard.html">
        <i class="bi bi-grid-1x2"></i>
        <span>Inicio</span>
    </a>

    <a href="#" id="depositNavBtn">
        <i class="bi bi-currency-dollar"></i>
        <span>Depositar</span>
    </a>

    <a href="retirar.html">
    <i class="bi bi-cash-stack"></i>
    <span>Retirar</span>
</a>

    <a class="active" href="transaction.html">
        <i class="bi bi-journal-text"></i>
        <span>Movimientos</span>
    </a>

    <a href="#" id="logoutBtn">
        <i class="bi bi-box-arrow-right"></i>
        <span>Salir</span>
    </a>
    </aside>

    <main class="bank-main">
        <header class="bank-header-desktop">
            <div>
                <p>Historial de transacciones</p>
                <h1>Movimientos de la Cuenta</h1>
            </div>
            <div class="header-badge">
                <i class="bi bi-shield-check"></i>
                <span>Modo seguro</span>
            </div>
        </header>

        <section class="card border-0 shadow-sm p-4 mb-4 bg-white rounded-3">
            <h5 class="mb-3 text-secondary"><i class="bi bi-funnel me-2"></i>Filtrar transacciones</h5>
            <form class="row g-3">
                <div class="col-md-4">
                    <label class="form-label text-muted small">Seleccionar Cuenta</label>
                    <select class="form-select">
                        <option selected>Todas las cuentas</option>

                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label text-muted small">Tipo de movimiento</label>
                    <select class="form-select">
                        <option selected>Todos</option>
                        <option value="deposito">Depósitos</option>
                        <option value="retiro">Retiros</option>
                        <option value="transferencia">Transferencias</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label text-muted small">Fecha</label>
                    <input type="date" class="form-select">
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="button" class="btn btn-primary w-100">
                        <i class="bi bi-search me-1"></i> Buscar
                    </button>
                </div>

            </form>
        </section>

        <section class="card border-0 shadow-sm bg-white rounded-3 overflow-hidden">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4 py-3">Fecha y Hora</th>
                                <th class="py-3">ID Transacción</th>
                                <th class="py-3">Descripción / Concepto</th>
                                <th class="py-3">Tipo</th>
                                <th class="text-end pe-4 py-3">Monto</th>
                            </tr>
                        </thead>



                    </table>
                </div>
            </div>
            
            <div class="card-footer bg-white d-flex justify-content-between align-items-center py-3 border-top-0">

                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item disabled"><a class="page-link" href="#">Anterior</a></li>
                        <li class="page-item active"><a class="page-link" href="#">1</a></li>
                        <li class="page-item"><a class="page-link" href="#">Siguiente</a></li>
                    </ul>
                </nav>
            </div>
        </section>

    </main>

    <script type="module" src="./assets/js/dashboard.js"></script>
</body>

</html>
