<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirar dinero</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./assets/css/dashboard.css?v=32">
</head>

<body class="dashboard-bank-page">

    <input type="checkbox" id="sidebarToggle" class="sidebar-toggle">

    <label for="sidebarToggle" class="sidebar-menu-btn">
        <span></span>
        <span></span>
    </label>

    <aside class="bank-sidebar">
        <div class="sidebar-logo">
            <img src="./assets/pictures/logoBank.png" alt="Logo banco">
            <h2>ARGENTARIA</h2>
            <p>Sistema bancario académico</p>
        </div>

        <nav>
            <a href="dashboard.html">
                <i class="bi bi-grid-1x2"></i>
                <span>Inicio</span>
            </a>

            <a href="#">
                <i class="bi bi-currency-dollar"></i>
                <span>Depositar</span>
            </a>

            <a class="active" href="retirar.html">
                <i class="bi bi-cash-stack"></i>
                <span>Retirar</span>
            </a>

            <a href="transaction.html">
                <i class="bi bi-journal-text"></i>
                <span>Movimientos</span>
            </a>

            <a href="#" id="logoutBtn">
                <i class="bi bi-box-arrow-right"></i>
                <span>Salir</span>
            </a>
        </nav>
    </aside>

    <main class="bank-main">

        <header class="bank-header-desktop">
            <div>
                <p>Operación bancaria</p>
                <h1>Retirar dinero</h1>
            </div>

            <div class="header-badge">
                <i class="bi bi-shield-check"></i>
                <span>Modo seguro</span>
            </div>
        </header>

        <section class="dashboard-card">

            <div class="card-title-row">
                <h3>RETIRAR DINERO</h3>
            </div>

            <div id="retirarAlert" class="alert alert-danger d-none"></div>
            <div id="retirarSuccess" class="alert alert-success d-none"></div>

            <form id="retirarForm">

                <div class="mb-3">
                    <label class="form-label fw-bold">Monto a retirar</label>
                    <input type="number" id="amount" class="form-control" placeholder="Ejemplo: 500" min="1">
                </div>

                <button type="submit" id="retirarBtn" class="btn btn-danger w-100 fw-bold">
                    <i class="bi bi-cash-stack me-2"></i>
                    Retirar dinero
                </button>

            </form>

        </section>

    </main>

    <script type="module" src="./assets/js/retirar.js?v=1"></script>

</body>

</html>
