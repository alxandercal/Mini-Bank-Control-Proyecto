<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./assets/css/register.css">
</head>

<body class="register-bank-page">

    <main class="desktop-auth register-layout">

        <section class="auth-right register-form-side">
            <div class="auth-card">

                <h2>Crear cuenta</h2>
                <p>Registra tus datos para abrir tu cuenta digital</p>

                <div id="registerAlert" class="alert alert-danger d-none"></div>

                <form id="registerForm">

                    <div class="form-group-bank">
                        <label for="name">Nombre completo</label>
                        <input type="text" id="name" placeholder="Tu nombre completo">
                    </div>

                    <div class="form-group-bank">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" placeholder="correo@argentaria.com">
                    </div>

                    <div class="form-group-bank">
                        <label for="phone">Teléfono</label>
                        <input type="tel" id="phone" placeholder="Número de teléfono">
                    </div>

                    <div class="form-group-bank">
                        <label for="curp">CURP</label>
                        <input type="text" id="curp" placeholder="Ingresa tu CURP" maxlength="18">
                    </div>

                    <div class="form-group-bank">
                        <label for="address">Dirección</label>
                        <input type="text" id="address" placeholder="Calle, número, colonia, ciudad">
                    </div>

                    <div class="form-group-bank">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="Mínimo 6 caracteres">
                    </div>

                    <div class="form-group-bank">
                        <label for="confirmPassword">Confirmar contraseña</label>
                        <input type="password" id="confirmPassword" placeholder="Repite tu contraseña">
                    </div>

                    <button type="submit" id="registerBtn" class="btn-bank-primary">
                        <i class="bi bi-person-plus-fill me-2"></i>
                        Crear cuenta
                    </button>

                </form>

                <div class="auth-bottom-links">
                    ¿Ya tienes cuenta?
                    <a href="login.html">Inicia sesión</a>
                </div>

            </div>
        </section>

        <section class="auth-left">
            <img src="./assets/pictures/logoBank.png" alt="Logo banco">
            <h1>ARGENTARIA</h1>
            <p>La nueva experiencia bancaria inteligente.</p>
        </section>

    </main>

    <script type="module" src="./assets/js/register.js"></script>

</body>

</html>
