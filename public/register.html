<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Crear cuenta</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


</head>

<body class="auth-page">
    <div class="auth-wrapper d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-6 col-lg-5">
                    <div class="sigin-card auth-card card shadow-sm border-0">
                        <div class="card-body p-4 p-md-5 text-center">
                            <div class="brand-badge mx-auto mb-3">
                                <img src="./assets/pictures/logoBank.png" alt="LogoBank"
                                    style="width: 100px; height: 100px; object-fit: contain;">
                            </div>
                            <h2>Crea una cuenta Bancaria</h2>
                            <div id="message"> </div>
                            <form id="registerForm" novalidate>
                                <div class="mb-3">
                                    <label for="name" class="form-label">Nombre completo</label>
                                    <input type="text" class="form-control form-control-lg" id="name"
                                        placeholder="Tu nombre completo" required>
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label">Correo electrónico</label>
                                    <input type="email" class="form-control form-control-lg" id="email"
                                        placeholder="Correo institucional" required>
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label">Contraseña</label>
                                    <input type="password" class="form-control form-control-lg" id="password"
                                        placeholder="Mínimo 6 caracteres" required>
                                </div>
                                <div class="mb-3">
                                    <label for="confirmPassword" class="form-label">Confirmar contraseña</label>
                                    <input type="password" class="form-control form-control-lg" id="confirmPassword"
                                        placeholder="Repite tu contraseña" required>
                                </div>
                                <div class="d-grid mb-3">
                                    <button type="submit" id="registerBtn" class="btn btn-success btn-lg btnRegistro">
                                        <i class="bi bi-person-check me-2"></i>
                                        Crear cuenta
                                    </button>
                                </div>
                                <div class="text-center">
                                    <p class="mb-0 text-secondary">
                                        ¿Ya tienes cuenta?
                                        <a href="./login.html" class="fw-semibold text-decoration-none">Iniciasesión</a>
                                    </p>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            <script type="module" src="./assets/js/register.js"></script>
</body>

</html>
